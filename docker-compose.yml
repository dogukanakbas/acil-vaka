version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: acilvaka-backend
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/acilvaka.db:/app/acilvaka.db
      - ./backend/chroma_db:/app/chroma_db
    ports:
      - "8000:8000"

  frontend:
    build: 
      context: ./frontend
    container_name: acilvaka-frontend
    restart: always
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
